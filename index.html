<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src https://api.github.com https:; img-src 'self'; style-src 'self'; script-src 'self'; manifest-src 'self'; base-uri 'none'; form-action 'none'"
    />
    <title>Idea to Code</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">GitHub Issues TODO</p>
          <h1>Idea to Code</h1>
        </div>
        <button class="icon-button" id="settings-toggle" type="button" aria-label="설정 열기" title="설정">
          <span aria-hidden="true">⚙</span>
        </button>
      </header>

      <section class="settings-panel" id="settings-panel" hidden>
        <div class="settings-form">
          <div class="settings-actions">
            <button id="install-button" type="button">GitHub App 설치</button>
            <button id="reconnect-button" type="button" class="secondary">연결 확인</button>
          </div>
          <p class="hint">현재 Pages 주소에서 감지한 저장소에 GitHub App을 설치하면 이슈 목록과 상태가 자동으로 연결됩니다.</p>
        </div>
      </section>

      <main>
        <section class="status-row" aria-live="polite">
          <div>
            <span class="repo-chip" id="repo-chip">Repository 감지 중</span>
            <span id="sync-state">동기화 대기</span>
          </div>
          <button id="refresh-button" type="button" class="secondary">새로고침</button>
        </section>

        <section class="board" aria-label="GitHub issue kanban board">
          <article class="column" data-status="todo">
            <header>
              <h2>Todo</h2>
              <span class="count" id="todo-count">0</span>
            </header>
            <div class="issue-list" id="todo-list"></div>
          </article>
          <article class="column" data-status="doing">
            <header>
              <h2>Doing</h2>
              <span class="count" id="doing-count">0</span>
            </header>
            <div class="issue-list" id="doing-list"></div>
          </article>
          <article class="column" data-status="done">
            <header>
              <h2>Done</h2>
              <span class="count" id="done-count">0</span>
            </header>
            <div class="issue-list" id="done-list"></div>
          </article>
        </section>
      </main>

      <form id="composer" class="composer">
        <textarea id="idea-input" rows="1" placeholder="구현할 아이디어를 입력하세요" required></textarea>
        <button id="send-button" type="submit">전송</button>
      </form>
    </div>

    <template id="issue-card-template">
      <button class="issue-card" type="button">
        <span class="issue-title"></span>
        <span class="issue-meta"></span>
      </button>
    </template>

    <script src="./app-config.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
